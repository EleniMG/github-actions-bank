name: Docker Build

on:
  workflow_call:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: my-image

jobs:
  prepare-env-vars:
    name: Prepare env vars
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      SHORT_SHA: ${{ steps.create-tag.outputs.SHORT_SHA }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create Tag
        id: create-tag
        run: echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT